services:

  frontend:
    build:
      context: ./frontend
      target: runner
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # - NODE_ENV=production
      - HOST="0.0.0.0"
      - PORT=3000
      - NEXT_PUBLIC_API="http://localhost:5000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - app-network
    command: npm run dev
      
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      # - NODE_ENV=development
      - DATABASE_URL=postgres://postgres:postgres@db:5432/herbario
      - PORT=5000
    volumes:
      - ./backend:/app
      - /app/node_modules
    #   - postgres_data:/var/lib/postgresql/data
    depends_on:
      - db
    networks:
      - app-network
    command: npm run dev

  db:
    build:
      context: ./docker/database
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=herbario
    networks:
      - app-network


networks:
  app-network:
    driver: bridge

volumes:
  postgres_data: